services:
  - type: web
    name: eLearn-for-study
    env: python
    plan: free
    buildCommand: bash build.sh
    startCommand: gunicorn minor.wsgi:application --log-file -
    envVars:
      - key: DEBUG
        value: 'False'
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: '.onrender.com'
      - key: PYTHONUNBUFFERED
        value: '1'
      - key: PYTHON_VERSION
        value: '3.12.3'
